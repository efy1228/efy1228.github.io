<!DOCTYPE html>
<html>
<head>
  <title>Art Samples</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: white;
      font-family: "Poppins", sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    /* NAVBAR */
    .navbar {
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .nav-container a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .nav-container a:hover {
      color: hotpink;
    }

    /* PAGE */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    h1 {
      color: hotpink;
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    p {
      color: #bbb;
      margin-bottom: 40px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    /* ART CARD */
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #222;

      transition: 0.3s ease;
    }

    .card img {
      width: 100%;
      height: 100%;
      display: block;

      transition: 0.4s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card:hover {
      border-color: hotpink;
    }

    /* overlay text */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;

      padding: 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);

      font-size: 0.9rem;
      color: white;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html">HOME</a>
      <a href="Portfolio.html">LAB PORTFOLIO</a>
      <a href="3DRenders.html">3D RENDERS AND PROJECTS</a>
      <a href="ArtSamples.html">ART SAMPLES</a>
    </div>
  </nav>

  <div class="container">

    <h1>Art Samples</h1>
    <p>Digital illustrations, sketches, and experimental artwork.</p>

    <div class="grid">

      <div class="card">
        <img src="art/art1.jpg">
        <div class="overlay">Character Study</div>
      </div>

      <div class="card">
        <img src="art/art2.jpg">
        <div class="overlay">Lighting Practice</div>
      </div>

      <div class="card">
        <img src="art/art3.jpg">
        <div class="overlay">Sketch Render</div>
      </div>

      <div class="card">
        <img src="art/art4.jpg">
        <div class="overlay">Concept Piece</div>
      </div>

    </div>

  </div>

</body>
</html>
